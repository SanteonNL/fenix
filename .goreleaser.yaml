version: 2

project_name: fenix

before:
  hooks:
    - go mod tidy

builds:
  - id: fenix
    main: ./cmd/fenix
    binary: fenix
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: fenix
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config/config.example.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

release:
  github:
    owner: SanteonNL
    name: fenix
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
