services:
  hix-test-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hix-test-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "HixTest_Pass1!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "HixTest_Pass1!", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20
