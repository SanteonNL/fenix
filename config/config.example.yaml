# CSV to FHIR Converter Configuration

environment: dev  # dev (colored console output) | prod (JSON output)
logLevel: info    # trace, debug, info, warn, error — omit to use default (debug in dev, info in prod)

staging:
  database: sqlite        # sqlite (default) | postgres | sqlserver
  #path: ""                # sqlite: "" = in-memory (default), or e.g. data/staging.db to persist
  path: output/staging.db # persist to file — useful for debugging SQL queries after a run
  # connection: "host=localhost user=fenix dbname=staging" # postgres: full DSN
  # connection: "server=127.0.0.1;port=1433;user id=${HIX_USER};password=${HIX_PASSWORD};database=hix_staging;encrypt=false;TrustServerCertificate=true" # sqlserver
  # driver: sqlite        # pure Go, no CGO — default (modernc.org/sqlite)
  # driver: sqlite3       # CGO-based, requires GCC/MinGW (github.com/mattn/go-sqlite3)

fhir:
  sqlFile: ""
  profilesDir: terminology/profiles/sim
  conceptMapsDir: terminology/conceptmaps/flat

output:
  format: pretty          # json | ndjson | pretty
  type: local
  local:
    dir: output
    useTimestamp: true    # Create timestamped subdirectories for each run (default: true)
    archiveCount: 2      # Number of previous runs to keep in archive/ folder (0 = keep all, default: 5)

sources:
  hix-test:
    type: sqlserver
    connection_string: "server=127.0.0.1;port=1433;user id=${HIX_USER};password=${HIX_PASSWORD};database=hix;encrypt=false;TrustServerCertificate=true"

  luscii:
    type: luscii
    base_url: https://vitalsapi.luscii.com
    api_key: ${LUSCII_API_KEY}
    endpoints:
      - path: /v1/patients
        table: luscii_patients
        since_param: startDate
        end_param: endDate
        id_field: id

  sim:
    type: local
    dir: "test/data/sim"
    delimiter: ";"
    # json_options (local/sftp only): controls how a JSON file's records are split into tables.
    # Keyed by filename without extension, lowercased (e.g. journeys.json -> "journeys").
    #   id_field: response field used as the row's primary key, required for incremental upsert.
    #   children: map of field name -> sub-config. Each listed field is pulled out of the
    #             parent record into its own child table, named <source>_<file>_<field>,
    #             linked back to the parent via a generated FK column.
    #             - children.<field>: {}                     promote to a child table, flattened with no further nesting
    #             - children.<field>: {id_field, children}   recurse another level (grandchild tables), same rules apply
    # Any array field NOT listed under children is left as JSON text in the parent row (default behaviour).
    json_options:
      journeys:
        id_field: id                      # upsert key for the journeys table
        children:
          responsible_user_groups: {}     # -> sim_journeys_responsible_user_groups, no deeper nesting
          steps:                          # -> sim_journeys_steps, recurse one level further
            id_field: id
            children:
              completions: {}             # -> sim_journeys_steps_completions

  zbj-test:
    type: sftp
    host: "${ZBJ_SFTP_HOST}"       # e.g. <storage-account>.blob.core.windows.net
    port: 22
    username: "${ZBJ_SFTP_USER}"   # Azure format: <storage-account>.<container>.<local-user>
    key_file: "C:\\Users\\t.hetterscheid\\.ssh\\zbj-test-svc-id_rsa"
    remote_dir: "/"
    delimiter: ";"
