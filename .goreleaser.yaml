version: 2

project_name: fenix

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: fenix
    main: ./cmd/fenix
    binary: fenix
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: fenix
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/example.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - title: "✨ Features"
      regexp: '^feat'
    - title: "🐛 Bug Fixes"
      regexp: '^fix'
    - title: "🔧 Maintenance"
      regexp: '^(chore|refactor|ci)'
  filters:
    exclude:
      - '^docs'
      - '^test'

release:
  github:
    owner: santeon
    name: fenix
  draft: false
  prerelease: auto   # rc.* worden automatisch als pre-release gemarkeerd
  name_template: "{{.ProjectName}} {{.Tag}}"